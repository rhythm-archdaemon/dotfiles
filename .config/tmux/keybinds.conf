# ============================================================
# PREFIX
# ============================================================
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ============================================================
# SPLITS & WINDOWS
# ============================================================
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"   # vertical split, same dir
bind - split-window -v -c "#{pane_current_path}"   # horizontal split, same dir
bind c new-window -c "#{pane_current_path}"        # new window, same dir

# ============================================================
# PANE NAVIGATION
# ============================================================
bind Left  select-pane -L
bind Right select-pane -R
bind Up    select-pane -U
bind Down  select-pane -D

# Resize panes with Prefix + Shift + Arrow
bind S-Left  resize-pane -L 5
bind S-Right resize-pane -R 5
bind S-Up    resize-pane -U 5
bind S-Down  resize-pane -D 5

# ============================================================
# WINDOW NAVIGATION
# ============================================================
bind -n M-Left  previous-window   # Alt+Left
bind -n M-Right next-window       # Alt+Right

# ============================================================
# RENAMING
# ============================================================
bind r command-prompt -I "#W" "rename-window '%%'"
bind R command-prompt -I "#S" "rename-session '%%'"

# ============================================================
# COPY MODE (vi-style)
# ============================================================
setw -g mode-keys vi
bind Enter copy-mode
bind -T copy-mode-vi v      send -X begin-selection
bind -T copy-mode-vi y      send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel
