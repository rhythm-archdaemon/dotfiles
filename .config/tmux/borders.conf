# ============================================================
# PANE BORDERS
# ============================================================
set -g pane-border-style "fg=#3b4261"              # inactive pane border
set -g pane-active-border-style "fg=#7aa2f7"       # active pane border (Tokyo Night blue)

# Draw borders around every pane (box effect)
set -g pane-border-lines "double"                  # single, double, heavy, simple, number



