# ============================================================
# GENERAL SETTINGS
# ============================================================
set -g default-terminal "screen-256color"   # 256 color support
set -g history-limit 10000                  # scrollback buffer
set -g base-index 1                         # windows start at 1
setw -g pane-base-index 1                   # panes start at 1
set -g mouse on                             # enable mouse support
set -sg escape-time 0                       # no delay for escape key
set -g display-time 2000                    # message display duration (ms)
set -g status-interval 5                    # refresh status bar every 5s
set -g renumber-windows on                  # renumber on window close

# ============================================================
# PREFIX
# ============================================================
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# ============================================================
# SPLITS & WINDOWS
# ============================================================
unbind '"'
unbind %
bind | split-window -h -c "#{pane_current_path}"   # vertical split, same dir
bind - split-window -v -c "#{pane_current_path}"   # horizontal split, same dir
bind c new-window -c "#{pane_current_path}"        # new window, same dir

# ============================================================
# PANE NAVIGATION
# ============================================================
bind Left  select-pane -L
bind Right select-pane -R
bind Up    select-pane -U
bind Down  select-pane -D

# Resize panes with Prefix + Shift + Arrow
bind S-Left  resize-pane -L 5
bind S-Right resize-pane -R 5
bind S-Up    resize-pane -U 5
bind S-Down  resize-pane -D 5

# ============================================================
# WINDOW NAVIGATION
# ============================================================
bind -n "\e[1;3D" previous-window   # Alt+Left
bind -n "\e[1;3C" next-window       # Alt+Right

# ============================================================
# RENAMING
# ============================================================
bind r command-prompt -I "#W" "rename-window '%%'"
bind R command-prompt -I "#S" "rename-session '%%'"

# ============================================================
# COPY MODE  (vi-style)
# ============================================================
setw -g mode-keys vi
bind Enter copy-mode                        # Prefix+Enter → copy mode
bind -T copy-mode-vi v   send -X begin-selection
bind -T copy-mode-vi y   send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# ============================================================
# RELOAD CONFIG
# ============================================================
bind C-r source-file ~/dotfiles/.config/tmux/tmux.conf \; display "Config reloaded!"
