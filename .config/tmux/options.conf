# ============================================================
# GENERAL SETTINGS
# ============================================================
set -g default-terminal "screen-256color"   # 256 color support
set -g history-limit 10000                  # scrollback buffer
set -g base-index 1                         # windows start at 1
setw -g pane-base-index 1                   # panes start at 1
set -g mouse on                             # enable mouse support
set -sg escape-time 0                       # no delay for escape key
set -g display-time 2000                    # message display duration (ms)
set -g status-interval 5                    # refresh status bar every 5s
set -g renumber-windows on                  # renumber on window close
set -g xterm-keys on                        # proper xterm key sequences
