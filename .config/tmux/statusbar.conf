# ============================================================
# STATUS BAR - Tokyo Night
# ============================================================
set -g status-position bottom
set -g status-interval 5

set -g status-style "bg=#1a1b26 fg=#c0caf5"

# Left
set -g status-left-length 40
set -g status-left "#[bg=#7aa2f7 fg=#1a1b26 bold] #S #[default] "

# Right
set -g status-right-length 80
set -g status-right "#[fg=#9ece6a] %H:%M #[fg=#c0caf5]| #[fg=#7dcfff]%d-%b-%Y "

# Inactive windows
set -g window-status-format "#[fg=#565f89] #I:#W "

# Active window
set -g window-status-current-format "#[bg=#7aa2f7 fg=#1a1b26 bold] #I:#W "

set -g window-status-separator ""

# ============================================================
# BORDERS
# ============================================================
set -g pane-border-style "fg=#ffffff"             # inactive pane border
set -g pane-active-border-style "fg=#ffffff bold" # active pane border

